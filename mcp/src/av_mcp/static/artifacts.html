<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artifacts — Alpha Vantage MCP</title>
<!--
  Self-contained artifact viewer. Mirrors web/components/ArtifactsView.tsx: a code
  editor + live preview that compiles pasted React/JSX (with React hooks + all
  Recharts components available) via Babel and renders it, or sandboxes pasted
  full HTML in an iframe. Code + view mode persist in localStorage. The Next.js
  version used Monaco; this self-contained build uses a plain textarea to stay
  dependency-light, keeping the same compile/render behavior so a pasted artifact
  renders the same. React/ReactDOM/Recharts/Babel/Tailwind load from CDN, matching
  the original's runtime CDN usage.
-->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root { --av-green: #42DCA3; --av-panel: #1f1f1f; --av-border: rgba(66, 220, 163, 0.3); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: rgb(45, 45, 45); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  .toolbar {
    height: 3rem; flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
    padding: 0 1rem; background: var(--av-panel); border-bottom: 1px solid var(--av-border);
  }
  .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 0.75rem; }
  .toggle { display: flex; gap: 0.25rem; padding: 0.25rem; border-radius: 0.5rem; background: rgba(66, 220, 163, 0.1); }
  .toggle button {
    padding: 0.35rem 1rem; font-size: 0.875rem; font-weight: 500; border: none; border-radius: 0.375rem;
    background: transparent; color: var(--av-green); cursor: pointer;
  }
  .toggle button.active { background: var(--av-green); color: var(--av-panel); }
  .btn {
    padding: 0.35rem 0.75rem; font-size: 0.875rem; border-radius: 0.375rem; cursor: pointer;
    background: var(--av-green); color: var(--av-panel); border: none;
  }
  .btn.secondary { background: rgba(255, 255, 255, 0.1); color: var(--av-green); border: 1px solid var(--av-green); }
  .status { font-size: 0.75rem; color: var(--av-green); }
  .hint { font-size: 0.75rem; color: rgba(255, 255, 255, 0.6); }
  .err { font-size: 0.75rem; font-weight: 500; color: #ff6b6b; }
  .main { flex: 1 1 auto; min-height: 0; background: #fff; display: flex; }
  .editor-pane { height: 100%; border-right: 1px solid #e5e7eb; }
  .preview-pane { height: 100%; overflow: auto; background: #f9fafb; }
  .split .editor-pane, .split .preview-pane { width: 50%; }
  .full { width: 100%; }
  textarea {
    width: 100%; height: 100%; border: 0; resize: none; padding: 1rem; outline: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px;
    line-height: 1.5; tab-size: 2; color: #1f2937; background: #fff;
  }
  .preview-host { width: 100%; min-height: 100%; }
  .preview-host iframe { width: 100%; height: 100%; min-height: 80vh; border: 0; }
  .render-error { margin: 1rem; padding: 1rem; background: #fef2f2; border: 1px solid #fecaca; border-radius: 0.5rem; }
  .render-error h3 { margin: 0 0 0.5rem; color: #991b1b; font-size: 1rem; }
  .render-error pre { margin: 0; color: #dc2626; font-size: 0.875rem; white-space: pre-wrap; }
</style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="toggle" id="toggle">
          <button data-mode="code">Code</button>
          <button data-mode="split">Split</button>
          <button data-mode="preview">Preview</button>
        </div>
        <button class="btn" id="upload-btn">Upload File</button>
        <button class="btn secondary" id="reset-btn">Reset to Default</button>
        <input type="file" id="file-input" accept=".tsx,.html,.htm" style="display:none">
      </div>
      <div class="toolbar-right">
        <span class="err" id="err-flag" style="display:none">Error in code</span>
        <span class="status" id="status"></span>
        <span class="hint">Press &#8984;E to cycle views</span>
      </div>
    </div>
    <div class="main" id="main">
      <div class="editor-pane" id="editor-pane">
        <textarea id="code" spellcheck="false"></textarea>
      </div>
      <div class="preview-pane" id="preview-pane">
        <div class="preview-host" id="preview"></div>
      </div>
    </div>
  </div>

  <script>
    var STORAGE_KEY = 'artifactsView.code';
    var VIEW_MODE_KEY = 'artifactsView.viewMode';

    var defaultCode = [
      "// Welcome to the React Artifacts Editor!",
      "// You can use import statements - they'll be automatically handled",
      "// Available imports:",
      "// - React hooks: useState, useEffect, useMemo, useRef",
      "// - All Recharts components and utilities (LineChart, BarChart, PieChart, AreaChart,",
      "//   ScatterChart, ComposedChart, XAxis, YAxis, CartesianGrid, Tooltip, Legend, Cell, etc.)",
      "// Export your component as default at the end",
      "",
      "import { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, PieChart, Pie, Cell } from 'recharts';",
      "",
      "const MyComponent = () => {",
      "  const [count, setCount] = useState(0);",
      "  const [text, setText] = useState('Hello, World!');",
      "",
      "  const data = [",
      "    { name: 'Jan', value: 400 },",
      "    { name: 'Feb', value: 300 },",
      "    { name: 'Mar', value: 600 },",
      "    { name: 'Apr', value: 800 },",
      "    { name: 'May', value: 500 }",
      "  ];",
      "",
      "  const colors = ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#8884D8'];",
      "",
      "  return (",
      "    <div className=\"p-8 max-w-4xl mx-auto\">",
      "      <h1 className=\"text-3xl font-bold mb-6 text-gray-800\">Interactive React Component</h1>",
      "      <div className=\"space-y-6\">",
      "        <div className=\"bg-white p-6 rounded-lg shadow-md\">",
      "          <h2 className=\"text-xl font-semibold mb-4\">Counter Example</h2>",
      "          <div className=\"flex items-center gap-4\">",
      "            <button onClick={() => setCount(count - 1)} className=\"px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600\">-</button>",
      "            <span className=\"text-2xl font-bold\">{count}</span>",
      "            <button onClick={() => setCount(count + 1)} className=\"px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600\">+</button>",
      "          </div>",
      "        </div>",
      "        <div className=\"bg-white p-6 rounded-lg shadow-md\">",
      "          <h2 className=\"text-xl font-semibold mb-4\">Text Input</h2>",
      "          <input type=\"text\" value={text} onChange={(e) => setText(e.target.value)} className=\"w-full px-4 py-2 border rounded-lg\" placeholder=\"Type something...\" />",
      "          <p className=\"mt-2 text-gray-600\">You typed: {text}</p>",
      "        </div>",
      "        <div className=\"bg-white p-6 rounded-lg shadow-md\">",
      "          <h2 className=\"text-xl font-semibold mb-4\">Chart Visualization</h2>",
      "          <ResponsiveContainer width=\"100%\" height={200}>",
      "            <BarChart data={data}>",
      "              <CartesianGrid strokeDasharray=\"3 3\" />",
      "              <XAxis dataKey=\"name\" />",
      "              <YAxis />",
      "              <Tooltip />",
      "              <Bar dataKey=\"value\" fill=\"#8884d8\" />",
      "            </BarChart>",
      "          </ResponsiveContainer>",
      "        </div>",
      "        <div className=\"bg-white p-6 rounded-lg shadow-md\">",
      "          <h2 className=\"text-xl font-semibold mb-4\">Pie Chart</h2>",
      "          <ResponsiveContainer width=\"100%\" height={300}>",
      "            <PieChart>",
      "              <Pie data={data} cx=\"50%\" cy=\"50%\" labelLine={false} label={({name, value}) => `${name}: ${value}`} outerRadius={80} fill=\"#8884d8\" dataKey=\"value\">",
      "                {data.map((entry, index) => (<Cell key={`cell-${index}`} fill={colors[index % colors.length]} />))}",
      "              </Pie>",
      "              <Tooltip />",
      "            </PieChart>",
      "          </ResponsiveContainer>",
      "        </div>",
      "      </div>",
      "    </div>",
      "  );",
      "};",
      "",
      "export default MyComponent;"
    ].join("\n");

    // Imports made available to pasted code (React core + hooks + all of Recharts).
    var availableImports = Object.assign({
      React: React,
      useState: React.useState,
      useEffect: React.useEffect,
      useMemo: React.useMemo,
      useRef: React.useRef
    }, window.Recharts || {});

    var state = {
      code: defaultCode,
      viewMode: 'split',
      codeType: 'react',
      error: null,
      root: null
    };

    var els = {
      main: document.getElementById('main'),
      editorPane: document.getElementById('editor-pane'),
      previewPane: document.getElementById('preview-pane'),
      textarea: document.getElementById('code'),
      preview: document.getElementById('preview'),
      toggle: document.getElementById('toggle'),
      status: document.getElementById('status'),
      errFlag: document.getElementById('err-flag'),
      uploadBtn: document.getElementById('upload-btn'),
      resetBtn: document.getElementById('reset-btn'),
      fileInput: document.getElementById('file-input')
    };

    // ---- Compile pasted React/JSX into a component (port of compileReactCode) ----
    function compileReactCode(sourceCode) {
      try {
        var importRegex = /import\s+(?:{([^}]+)}|(\w+)|\*\s+as\s+(\w+))\s+from\s+['"]([^'"]+)['"]/gm;
        var usedImports = {};
        var match;
        while ((match = importRegex.exec(sourceCode)) !== null) {
          if (match[1]) {
            match[1].split(',').forEach(function (imp) {
              usedImports[imp.split(' as ')[0].trim()] = true;
            });
          } else if (match[2]) {
            usedImports[match[2]] = true;
          }
        }

        var codeWithoutComments = sourceCode
          .replace(/\/\*[\s\S]*?\*\//g, '')
          .replace(/\/\/.*/g, '');
        Object.keys(availableImports).forEach(function (key) {
          if (new RegExp('\\b' + key + '\\b').test(codeWithoutComments)) {
            usedImports[key] = true;
          }
        });

        var codeWithoutImports = sourceCode
          .replace(/^import\s+.*?from\s+['"].*?['"];?\s*$/gm, '')
          .replace(/^import\s+['"].*?['"];?\s*$/gm, '')
          .trim();

        var transformedCode;
        try {
          var res = Babel.transform(codeWithoutImports, {
            presets: ['react', 'typescript'],
            parserOpts: { plugins: ['jsx', 'typescript'], errorRecovery: true }
          });
          if (!res || !res.code) throw new Error('Failed to transform code');
          transformedCode = res.code;
        } catch (babelError) {
          var fb = Babel.transform(codeWithoutImports, {
            presets: ['react'],
            parserOpts: { plugins: ['jsx'], errorRecovery: true }
          });
          if (!fb || !fb.code) throw babelError;
          transformedCode = fb.code;
        }

        var modifiedCode = transformedCode.replace(/export\s+default\s+(\w+);?/g, 'Component = $1;');

        var params = ['React'];
        var args = [React];
        Object.keys(usedImports).forEach(function (name) {
          if (name !== 'React' && availableImports[name]) {
            params.push(name);
            args.push(availableImports[name]);
          }
        });

        var functionBody = 'let Component = null;\n' + modifiedCode + '\nreturn Component;';
        var func = Function.apply(null, params.concat([functionBody]));
        var Component = func.apply(null, args);
        return { success: true, component: Component };
      } catch (err) {
        return { success: false, error: err.toString() };
      }
    }

    var tailwindLoaded = false;
    function withTailwind(cb) {
      if (tailwindLoaded || document.querySelector('script[data-tailwind]')) { cb(); return; }
      var s = document.createElement('script');
      s.src = 'https://cdn.tailwindcss.com';
      s.setAttribute('data-tailwind', '1');
      s.onload = function () { tailwindLoaded = true; cb(); };
      document.head.appendChild(s);
    }

    function showRenderError(title, message) {
      els.preview.innerHTML = '';
      var box = document.createElement('div');
      box.className = 'render-error';
      var h = document.createElement('h3'); h.textContent = title;
      var pre = document.createElement('pre'); pre.textContent = message;
      box.appendChild(h); box.appendChild(pre);
      els.preview.appendChild(box);
    }

    function setError(msg) {
      state.error = msg;
      els.errFlag.style.display = (msg && state.viewMode !== 'code') ? '' : 'none';
    }

    function renderPreview() {
      if (state.viewMode === 'code') return;

      if (state.root) {
        var old = state.root;
        state.root = null;
        setTimeout(function () { old.unmount(); }, 0);
      }

      // Full HTML document -> sandboxed iframe.
      if (state.codeType === 'html') {
        try {
          els.preview.innerHTML = '';
          var iframe = document.createElement('iframe');
          iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-modals';
          els.preview.appendChild(iframe);
          var doc = iframe.contentDocument || (iframe.contentWindow && iframe.contentWindow.document);
          if (doc) { doc.open(); doc.write(state.code); doc.close(); }
          setError(null);
        } catch (err) {
          setError(err.toString());
          showRenderError('HTML Error', err.toString());
        }
        return;
      }

      // React/JSX -> compile + render with Tailwind available for classes.
      var result = compileReactCode(state.code);
      if (result.success && result.component) {
        withTailwind(function () {
          try {
            els.preview.innerHTML = '';
            var container = document.createElement('div');
            els.preview.appendChild(container);
            state.root = ReactDOM.createRoot(container);
            state.root.render(React.createElement(result.component));
            setError(null);
          } catch (err) {
            setError(err.toString());
            showRenderError('Runtime Error', err.toString());
          }
        });
      } else {
        setError(result.error || 'Unknown error');
        showRenderError('Compilation Error', result.error || 'Unknown error');
      }
    }

    function detectCodeType() {
      var t = state.code.trim().toLowerCase();
      state.codeType = (t.indexOf('<!doctype html') === 0 || t.indexOf('<html') === 0) ? 'html' : 'react';
    }

    function updateStatus() {
      var typeLabel = state.codeType === 'html' ? 'HTML' : 'JSX';
      if (state.viewMode === 'code') els.status.textContent = typeLabel + ' • Auto-saved';
      else if (state.viewMode === 'split') els.status.textContent = 'Split View • ' + typeLabel;
      else els.status.textContent = 'Live Preview';
    }

    function applyViewMode() {
      els.main.className = 'main ' + (state.viewMode === 'split' ? 'split' : 'single');
      var showEditor = state.viewMode === 'code' || state.viewMode === 'split';
      var showPreview = state.viewMode === 'preview' || state.viewMode === 'split';
      els.editorPane.style.display = showEditor ? '' : 'none';
      els.previewPane.style.display = showPreview ? '' : 'none';
      els.editorPane.className = 'editor-pane' + (state.viewMode === 'code' ? ' full' : '');
      els.previewPane.className = 'preview-pane' + (state.viewMode === 'preview' ? ' full' : '');

      // Show/hide upload + reset (only in code/split, like the original).
      var showActions = state.viewMode !== 'preview';
      els.uploadBtn.style.display = showActions ? '' : 'none';
      els.resetBtn.style.display = showActions ? '' : 'none';

      Array.prototype.forEach.call(els.toggle.children, function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-mode') === state.viewMode);
      });
      updateStatus();
      els.errFlag.style.display = (state.error && state.viewMode !== 'code') ? '' : 'none';
      renderPreview();
    }

    function saveCode() { try { localStorage.setItem(STORAGE_KEY, state.code); } catch (e) {} }
    function saveMode() { try { localStorage.setItem(VIEW_MODE_KEY, state.viewMode); } catch (e) {} }

    function setCode(value, fromUser) {
      state.code = value;
      if (els.textarea.value !== value) els.textarea.value = value;
      detectCodeType();
      updateStatus();
      saveCode();
      renderPreview();
    }

    // ---- Wire up events ----
    els.textarea.addEventListener('input', function () { setCode(els.textarea.value, true); });

    Array.prototype.forEach.call(els.toggle.children, function (btn) {
      btn.addEventListener('click', function () {
        state.viewMode = btn.getAttribute('data-mode');
        saveMode();
        applyViewMode();
      });
    });

    els.uploadBtn.addEventListener('click', function () { els.fileInput.click(); });
    els.fileInput.addEventListener('change', function (e) {
      var file = e.target.files && e.target.files[0];
      if (file && /\.(tsx|html|htm)$/i.test(file.name)) {
        var reader = new FileReader();
        reader.onload = function (ev) { setCode(ev.target.result, true); };
        reader.readAsText(file);
      } else if (file) {
        alert('Please select a .tsx or .html file');
      }
      e.target.value = '';
    });

    els.resetBtn.addEventListener('click', function () {
      if (confirm('Are you sure you want to reset to the default code? This will overwrite your current code.')) {
        setCode(defaultCode, true);
      }
    });

    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && (e.key === 'e' || e.key === 'E')) {
        e.preventDefault();
        state.viewMode = state.viewMode === 'code' ? 'split' : (state.viewMode === 'split' ? 'preview' : 'code');
        saveMode();
        applyViewMode();
      }
    });

    // ---- Hydrate from localStorage and do the first render ----
    (function init() {
      try {
        var savedMode = localStorage.getItem(VIEW_MODE_KEY);
        if (savedMode === 'code' || savedMode === 'preview' || savedMode === 'split') state.viewMode = savedMode;
        var savedCode = localStorage.getItem(STORAGE_KEY);
        if (savedCode) state.code = savedCode;
      } catch (e) {}
      els.textarea.value = state.code;
      detectCodeType();
      applyViewMode();
    })();
  </script>
</body>
</html>
