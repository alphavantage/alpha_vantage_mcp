name: Deploy Lambda MCP Server

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - prod

env:
  AWS_REGION: us-east-1

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub Environment - secrets are pulled from here automatically
    environment: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || 'default' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Parse config
        id: config
        run: |
          # Parse JSON config secret and export as env vars
          CONFIG='${{ secrets.CONFIG }}'
          echo "$CONFIG" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' >> $GITHUB_ENV
          # Mask all config values to prevent them from appearing in subsequent step logs
          echo "$CONFIG" | jq -r '.[]' | while read -r value; do
            [ -n "$value" ] && echo "::add-mask::$value"
          done

      - name: Export dependencies and bundle workspace packages
        run: |
          uv export --package marketdata-mcp-server --format=requirements-txt --no-hashes | grep -v "^-e \." > mcp/requirements.txt
          cp -r api/src/av_api mcp/av_api

      - name: Build SAM application
        run: sam build

      - name: Deploy to AWS
        run: |
          PARAM_OVERRIDES=""
          [ -n "$DOMAIN_NAME" ] && PARAM_OVERRIDES="$PARAM_OVERRIDES DomainName=$DOMAIN_NAME"
          [ -n "$CERTIFICATE_ARN" ] && PARAM_OVERRIDES="$PARAM_OVERRIDES CertificateArn=$CERTIFICATE_ARN"
          [ -n "$STATIC_FILES_BUCKET" ] && PARAM_OVERRIDES="$PARAM_OVERRIDES StaticFilesBucket=$STATIC_FILES_BUCKET"
          [ -n "$CDN_BUCKET_NAME" ] && PARAM_OVERRIDES="$PARAM_OVERRIDES CdnBucketName=$CDN_BUCKET_NAME"
          [ -n "$CDN_DOMAIN" ] && PARAM_OVERRIDES="$PARAM_OVERRIDES CdnDomain=$CDN_DOMAIN"
          [ -n "$JWT_SECRET_KEY" ] && PARAM_OVERRIDES="$PARAM_OVERRIDES JwtSecretKey=$JWT_SECRET_KEY"
          [ -n "$AV_APIKEY_ENC_KEY" ] && PARAM_OVERRIDES="$PARAM_OVERRIDES AvApikeyEncKey=$AV_APIKEY_ENC_KEY"
          if [ -n "$PARAM_OVERRIDES" ]; then
            sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --parameter-overrides $PARAM_OVERRIDES
          else
            sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
          fi

      - name: Invalidate CloudFront cache
        run: |
          # The default behavior now serves / and /artifacts from the Lambda, so
          # invalidate the old S3-cached objects (and any stale regenerated HTML).
          # CLOUDFRONT_DISTRIBUTION_ID comes from the CONFIG secret (Parse config).
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
              --paths "/" "/artifacts" \
              --no-cli-pager
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID not set - skipping cache invalidation"
          fi
